spring.application.name=configuration-app-backend

# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017
spring.data.mongodb.database=configapp

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-environment-with-at-least-256-bits
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Virtual Threads Configuration (Java 21 - Spring Boot 3.2)
spring.threads.virtual.enabled=true

# Async Configuration with Virtual Threads
spring.task.execution.thread-name-prefix=vt-async-
spring.task.execution.pool.type=virtual
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=100
spring.task.execution.pool.queue-capacity=1000

# Security Context Inheritance for Async Operations
spring.security.filter.dispatcher-types=REQUEST,FORWARD,INCLUDE,ERROR,ASYNC

# Logging
logging.level.root=INFO
logging.level.com.configapp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.access=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
